name: CI/CD Spring Boot to EC2

on:
  push:
    branches: [ "master" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_IMAGE }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ 1. Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # ✅ 2. Set up Java (required for Maven build)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    # ✅ 3. Build Spring Boot JAR
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # ✅ 4. Login to Docker Hub (using YOUR secrets)
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ✅ 5. Build & Push Docker image
    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_NAME }}

    # ✅ 6. Deploy to EC2 via SSH
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ env.IMAGE_NAME }}
          docker stop food-app || true
          docker rm food-app || true
          docker run -d -p 8020:8020 --name food-app ${{ env.IMAGE_NAME }}
