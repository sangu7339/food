name: CI/CD Spring Boot to EC2

on:
  push:
    branches: [ "master" ]

env:
  IMAGE_NAME: seegisangu/food-app:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # ✅ Build JAR (Maven project)
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # ✅ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # ✅ Build & Push Docker image
    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_NAME }}

    # ✅ Deploy to EC2 using SSH
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ env.IMAGE_NAME }}
          docker stop food-app || true
          docker rm food-app || true
          docker run -d -p 8080:8080 --name food-app ${{ env.IMAGE_NAME }}
